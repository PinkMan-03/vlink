syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package pb.proxy;

enum Mode{
  OFFLINE = 0;
  OBSERVE_ONE = 1;
  OBSERVE_ALL = 2;
  RECORD = 3;
  PLAY = 4;
  EDIT = 5;
  AUTO = 6;
  AUTO_AND_OBSERVE_ALL = 7;
};

enum Status{
  ACTIVE = 0;
  INACTIVE = 1;
  PENDING = 2;
  INVALID = 3;
};

message Process {
  uint32 type = 1;
  string host = 2;
  uint32 pid = 3;
  string name = 4;
  string ip = 5;
}

message Info {
  uint32 type = 1;
  string url = 2;
  string ser = 3;
  uint32 schema = 4;
  Status status = 5;
  float freq = 6;
  uint64 rate = 7;
  float loss =  8;
  float latency = 9;
  repeated Process process_list = 11;
}

message InfoList {
  uint32 control_id = 1;
  repeated Info info_list = 2;
  string hostname = 11;
}

message Time {
  uint32 control_id = 1;
  Mode mode = 2;
  uint64 sys_time = 3;
  uint64 boot_time = 4;
  bool reliable_mode = 11;
  bool tcp_mode = 12;
  bool direct_mode = 13;
  string version = 21;
  string hostname = 22;
  string machine_id = 23;
  double cpu_usage = 31;
  double memory_usage = 32;
  string token = 41;
}

message Data {
  uint32 control_id = 1;
  Mode mode = 2;
  int64 timestamp = 3;
  string url = 4;
  string ser = 5;
  uint32 schema = 6;
  bytes raw = 7;
  int64 seq = 8;
  string hostname = 11;
}

enum HandshakeResult {
  HANDSHAKE_OK = 0;
  HANDSHAKE_VERSION_MISMATCH = 1;
  HANDSHAKE_INTERNAL_ERROR = 2;
}

message HandshakeReq {
  uint32 control_id = 1;
  string version = 2;
  string hostname = 3;
  string role = 4;
}

message HandshakeResp {
  HandshakeResult result = 1;
  string token = 2;
  string version = 3;
  string hostname = 4;
  string machine_id = 5;
}

message Control {
  uint32 control_id = 1;
  Mode mode = 2;
  bool filter_by_process = 11;
  string filter_str = 12;
  uint32 filter_type = 13;
  repeated string sub_url_list = 21;
  repeated string sub_ser_list = 22;
  repeated uint32 sub_schema_list = 23;
  repeated string pub_url_list = 31;
  repeated string pub_ser_list = 32;
  repeated uint32 pub_schema_list = 33;
  string token = 41;
}
